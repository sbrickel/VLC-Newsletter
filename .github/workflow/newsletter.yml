name: Valencia Events Page

on:
  schedule:
    - cron: "0 7 * * 1"  # every Monday 07:00 UTC
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  build-page:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - name: Install Playwright's Chromium (for JS-rendered sources)
        run: playwright install --with-deps chromium

      - name: Build the events page
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python src/main.py

      - name: Commit updated page
        run: |
          git config user.name "newsletter-bot"
          git config user.email "actions@github.com"
          git add docs/index.html
          git diff --staged --quiet || git commit -m "Update events page"
          git push
