  # Community organizations
  # Replaces individually hand-picked Meetup groups (Valencia AI, Python
  # Valencia, Valencia Language Exchange, Valencia Nomads): this discovers
  # events from EVERY Meetup group in Valencia via the location-based
  # search page, not just a fixed list, then drops recurring ones using the
  # page's own "Every ..." label on each event card.
  - name: Meetup Valencia
    url: https://www.meetup.com/find/?location=es--Valencia
    category: community
    meetup_discovery: true
  # Intercultural Spain: no organization by this name found operating in
